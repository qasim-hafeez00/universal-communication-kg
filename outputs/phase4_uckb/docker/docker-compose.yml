version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# UCKB Phase 4 — Neo4j 5 + APOC + Neosemantics (n10s)
#
# Prerequisites:
#   1. Docker Desktop installed and running on Windows
#   2. Download n10s plugin JAR from:
#      https://github.com/neo4j-labs/neosemantics/releases
#      Place neo4j-rdfsync-X.X.X.jar in ./plugins/
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v   (DELETES all graph data)
#
# Neo4j Browser: http://localhost:7474
# Bolt endpoint: bolt://localhost:7687
# Credentials:   neo4j / uckb_admin_2024
# ─────────────────────────────────────────────────────────────────────────────

services:
  neo4j:
    image: neo4j:5.20.0-enterprise
    container_name: uckb_neo4j
    restart: unless-stopped

    environment:
      # Auth
      NEO4J_AUTH: neo4j/uckb_admin_2024
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"

      # Plugins — neo4j auto-downloads APOC; n10s must be placed in ./plugins/
      NEO4J_PLUGINS: '["apoc"]'

      # Memory tuning (adjust to available RAM)
      NEO4J_server_memory_heap_initial__size: 2g
      NEO4J_server_memory_heap_max__size:     4g
      NEO4J_server_memory_pagecache_size:     2g

      # Allow n10s and APOC procedures
      NEO4J_dbms_security_procedures_unrestricted: "n10s.*,apoc.*"
      NEO4J_dbms_security_procedures_allowlist:    "n10s.*,apoc.*"

      # Enable file-based RDF import (needed for local .ttl files)
      NEO4J_dbms_security_allow__csv__import__from__file__urls: "true"

      # Bolt and HTTP connector
      NEO4J_dbms_connector_bolt_listen__address: "0.0.0.0:7687"
      NEO4J_dbms_connector_http_listen__address: "0.0.0.0:7474"

      # Log level
      NEO4J_dbms_logs_query_enabled: "INFO"

    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7473:7473"   # Neo4j Browser (HTTPS)
      - "7687:7687"   # Bolt driver port

    volumes:
      # Persistent graph data and logs
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_conf:/conf

      # n10s plugin JAR — place neo4j-rdfsync-*.jar here before starting
      - ./plugins:/plugins

      # Phase 3 ontology files mounted read-only for n10s import
      # Access inside container as: file:///ontology/core/communication-acts.ttl
      - ../../phase3_uckb/uckb-ontology:/ontology:ro

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_conf:
