# ─────────────────────────────────────────────────────────────────────────────
# UCKB Neo4j Production Configuration
# Used when deploying Neo4j Desktop or bare-metal instead of Docker.
# For Docker deployment all settings below are already injected via environment
# variables in docker-compose.yml — this file is for reference only.
# ─────────────────────────────────────────────────────────────────────────────

# Database directories (Docker overrides these with volume mounts)
# server.directories.data=/data
# server.directories.logs=/logs
# server.directories.plugins=/plugins

# ── Memory ──────────────────────────────────────────────────────────────────
server.memory.heap.initial_size=2g
server.memory.heap.max_size=4g
server.memory.pagecache.size=2g

# ── Network ──────────────────────────────────────────────────────────────────
server.bolt.listen_address=0.0.0.0:7687
server.http.listen_address=0.0.0.0:7474

# ── Plugin security ──────────────────────────────────────────────────────────
# Both n10s (Neosemantics) and APOC must be explicitly allowed.
dbms.security.procedures.unrestricted=n10s.*,apoc.*
dbms.security.procedures.allowlist=n10s.*,apoc.*

# ── File import ──────────────────────────────────────────────────────────────
# Enables file:// URIs in n10s.rdf.import.fetch for local .ttl files.
# Point NEO4J_HOME/import/ at the uckb-ontology directory or use symlink.
dbms.security.allow_csv_import_from_file_urls=true

# ── Logging ──────────────────────────────────────────────────────────────────
dbms.logs.query.enabled=INFO
dbms.logs.query.threshold=1000ms

# ── Transaction limits ────────────────────────────────────────────────────────
# n10s bulk imports can be large; raise limits accordingly.
dbms.transaction.timeout=300s
dbms.memory.transaction.max_size=512m
